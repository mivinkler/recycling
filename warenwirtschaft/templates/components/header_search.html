<div class="header-menu-item header-menu-search">
  <div></div>
  <details class="header-details {% if has_active_filters %}icon-selected{% endif %}">
    <summary class="header-menu-icon">
      <svg  height="24px" fill="#606060" viewBox="0 0 121.702 122.881" xml:space="preserve">
        <g><path d="M53.617,0c14.806,0,28.21,6.001,37.913,15.705c9.703,9.703,15.704,23.107,15.704,37.913 c0,10.832-3.213,20.914-8.737,29.346l23.205,25.291l-16.001,14.627L83.322,98.258c-8.503,5.67-18.718,8.977-29.705,8.977 c-14.806,0-28.21-6.002-37.913-15.705C6.001,81.826,0,68.422,0,53.617c0-14.806,6.001-28.21,15.704-37.913 C25.407,6.001,38.812,0,53.617,0L53.617,0z M87.3,19.934c-8.619-8.62-20.528-13.951-33.683-13.951s-25.063,5.332-33.683,13.951 c-8.62,8.62-13.952,20.529-13.952,33.683s5.332,25.063,13.952,33.682c8.62,8.621,20.528,13.951,33.683,13.951 S78.681,95.92,87.3,87.299c8.62-8.619,13.951-20.527,13.951-33.682S95.92,28.554,87.3,19.934L87.3,19.934z"/></g>
      </svg>
      <span class="header-icon-tooltip">Suche</span>
    </summary>

    <div class="header-details-disclosure">
      <form method="GET">
        {% if sort_param %}
          <input type="hidden" name="sort" value="{{ sort_param }}">
        {% endif %}

        {% if search_filters %}
          <div class="header-search header-search-grid">
            {% for search_filter in search_filters %}
              {% if search_filter.type == "date" %}
                <div class="header-search-field header-search-field-date">
                  <label for="{{ search_filter.from_param }}">{{ search_filter.label }}</label>
                  <div class="header-search-date-range">
                    <input type="date" id="{{ search_filter.from_param }}" name="{{ search_filter.from_param }}" value="{{ search_filter.from_value }}">
                    <input type="date" id="{{ search_filter.to_param }}" name="{{ search_filter.to_param }}" value="{{ search_filter.to_value }}">
                  </div>
                </div>
              {% elif search_filter.type == "choice" %}
                <div class="header-search-field">
                  <label for="{{ search_filter.param }}">{{ search_filter.label }}</label>
                  <div class="header-search-control">
                    <select name="{{ search_filter.param }}" id="{{ search_filter.param }}">
                      <option value=""></option>
                      {% for option in search_filter.choices %}
                        <option value="{{ option.value }}" {% if search_filter.value == option.value %}selected{% endif %}>{{ option.label }}</option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
              {% else %}
                <div class="header-search-field">
                  <label for="{{ search_filter.param }}">{{ search_filter.label }}</label>
                  <div class="header-search-control">
                    <input type="text" id="{{ search_filter.param }}" name="{{ search_filter.param }}" value="{{ search_filter.value }}">
                  </div>
                </div>
              {% endif %}
            {% endfor %}

            <button type="submit" class="header-search-btn">Suchen</button>
          </div>
        {% endif %}
      </form>
    </div>
  </details>
</div>
