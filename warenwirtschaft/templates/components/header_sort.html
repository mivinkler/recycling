<div class="header-menu-item header-menu-search">
  <div></div>
  <details class="header-details {% if sort_param %}icon-selected{% endif %}">
    <summary class="header-menu-icon">
      <svg shape-rendering="geometricPrecision" text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd" clip-rule="evenodd" height="23px" fill="#606060" viewBox="0 0 443 511.62">
        <path fill-rule="nonzero" d="M152.93 286.97c0 17.1-13.87 30.97-30.97 30.97-17.11 0-30.98-13.87-30.98-30.97v-177.4l-37.45 40.31c-11.63 12.5-31.19 13.2-43.68 1.57-12.49-11.62-13.19-31.18-1.57-43.68L99.33 9.79l2.06-1.94c12.69-11.35 32.2-10.26 43.55 2.43l91.05 101.47c11.35 12.69 10.26 32.2-2.43 43.55-12.68 11.36-32.19 10.27-43.55-2.42l-37.08-41.33v175.42zm236.24 71.77c11.35-12.69 30.86-13.78 43.55-2.43 12.69 11.36 13.78 30.87 2.42 43.56L344.1 501.34c-11.36 12.69-30.87 13.78-43.55 2.42l-2.02-1.97-91.09-97.95c-11.63-12.49-10.93-32.05 1.57-43.67 12.49-11.63 32.05-10.93 43.67 1.57l37.46 40.31V231.53c0-17.11 13.87-30.97 30.97-30.97s30.97 13.86 30.97 30.97v168.54l37.09-41.33z"/>
      </svg>
      <span class="header-icon-tooltip">Sortieren</span>
    </summary>
    <div class="header-details-disclosure">
      {% for field, label in active_fields %}
      <div class="icon-sort">
        <span>{{ label }}</span>
        <div>
          <form method="GET" class="icon-sort-form">
            {% for key, value in request.GET.items %}
              {% if key != "sort" and key != "page" %}
                <input type="hidden" name="{{ key }}" value="{{ value }}">
              {% endif %}
            {% endfor %}
            <button type="submit" name="sort" value="{{ field }}_asc" class="icon-sort-btn {% if sort_param == field|add:'_asc' %}icon-active{% endif %}">&#9660;</button>
            <button type="submit" name="sort" value="{{ field }}_desc" class="icon-sort-btn {% if sort_param == field|add:'_desc' %}icon-active{% endif %}">&#9650;</button>
          </form>
        </div>
      </div>
      {% endfor %}
    </div>
  </details>
</div>
